<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Eid Mubarak 🌙</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet"/>
<style>
:root{
  --gold:#F0A830;--terra:#C96B3A;--amber:#E8832A;
  --cream:#FFF8EE;--warm:#FFFBF4;--brown:#3D2B1F;
  --teal:#1FA896;--rose:#E87FA0;
  --sky1:#F5C840;--sky2:#FDEBC8;
  --gr1:#8BAA6A;--gr2:#6B8A4A;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  width:100%;height:100%;overflow:hidden;
  font-family:'Fredoka One',cursive;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  user-select:none;
}

/* SCREENS */
.screen{position:fixed;inset:0;display:none;flex-direction:column;overflow:hidden}
.screen.active{display:flex}

/* KEYFRAMES */
@keyframes lswing{0%,100%{transform:rotate(-9deg)}50%{transform:rotate(9deg)}}
@keyframes mfloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes gfloat{0%,100%{transform:translateY(0) rotate(var(--r,0deg))}50%{transform:translateY(-13px) rotate(calc(var(--r,0deg)+6deg))}}
@keyframes enterR{from{opacity:0;transform:translateX(50px) scale(.9)}to{opacity:1;transform:translateX(0) scale(1)}}
@keyframes exitL{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(-60px)}}
@keyframes bounce{0%,100%{transform:translateY(0)}40%{transform:translateY(-14px)}70%{transform:translateY(-4px)}}
@keyframes wiggle{0%,100%{transform:rotate(0)}25%{transform:rotate(-7deg)}75%{transform:rotate(7deg)}}
@keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes npulse{0%,100%{box-shadow:0 3px 0 rgba(140,50,15,.4),0 0 0 0 rgba(201,107,58,.38)}50%{box-shadow:0 3px 0 rgba(140,50,15,.4),0 0 0 6px rgba(201,107,58,0)}}
@keyframes fwburst{0%{opacity:1;transform:translate(0,0)}100%{opacity:0;transform:translate(var(--fx),var(--fy))}}
@keyframes twinkle{0%,100%{opacity:.45}50%{opacity:.1}}
@keyframes finFam{from{opacity:0;transform:scale(.9) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}

.lsw{transform-origin:50% 0%;animation:lswing 3.5s ease-in-out infinite}
.lsw:nth-child(2){animation-delay:-1.2s}
.lsw:nth-child(3){animation-delay:-2.4s}
.mflt{animation:mfloat 4s ease-in-out infinite}
.geo{position:absolute;pointer-events:none;animation:gfloat var(--d,5s) var(--dl,0s) ease-in-out infinite}
.star{position:absolute;pointer-events:none;color:var(--terra);font-size:var(--fs,1rem);opacity:.4;animation:twinkle var(--d,3.5s) var(--dl,0s) ease-in-out infinite}


/* ═══════════════════════════════════
   INTRO
═══════════════════════════════════ */
#intro{
  align-items:center;justify-content:center;
  background:linear-gradient(160deg,var(--sky1) 0%,var(--sky2) 55%,#FFE09A 100%);
  z-index:30;
}
.i-lants{position:absolute;top:0;left:50%;transform:translateX(-50%);display:flex;gap:80px;pointer-events:none;z-index:2}
.i-moon{position:absolute;top:11%;right:7%;filter:drop-shadow(0 0 20px rgba(240,168,48,.65));z-index:2}
.i-title{font-size:clamp(2.8rem,12vw,5rem);color:var(--terra);text-align:center;line-height:1.05;z-index:3;text-shadow:3px 4px 0 rgba(180,60,20,.18);padding:0 16px}
.i-sub{font-family:'Nunito',sans-serif;font-weight:800;color:rgba(61,43,31,.52);font-size:clamp(.88rem,3.5vw,1.1rem);text-align:center;margin-top:10px;z-index:3;padding:0 26px}
.i-btn{
  margin-top:36px;padding:16px 20px;z-index:3;
  background:linear-gradient(135deg,#C96B3A,#E8832A);
  border:none;border-radius:60px;color:#fff;
  font-family:'Fredoka One',cursive;font-size:1.3rem;cursor:pointer;
  box-shadow:0 6px 0 rgba(140,50,15,.38),0 10px 26px rgba(200,100,50,.3);
  -webkit-appearance:none;transition:transform .12s,box-shadow .12s;
}
.i-btn:active{transform:translateY(3px);box-shadow:0 3px 0 rgba(140,50,15,.38)}


/* ═══════════════════════════════════
   SCENE  –  simple vertical stack:
   [SKY]    fixed height header
   [BUBBLE] flex auto, shrinks to content
   [STAGE]  flex 1, fills rest
═══════════════════════════════════ */
#scene{
  background:linear-gradient(to bottom,
    var(--sky1) 0%,var(--sky2) 40%,
    #C8DDB0 65%,var(--gr1) 100%);
  z-index:20;
}

/* SKY BAR */
#sky{
  flex:0 0 auto;
  height:100px;
  position:relative;overflow:hidden;
}
#s-lants{
  position:absolute;top:0;left:50%;transform:translateX(-50%);
  display:flex;gap:min(64px,16vw);pointer-events:none;
}
#s-moon{
  position:absolute;top:10px;right:min(40px,9vw);
  animation:mfloat 4s ease-in-out infinite;
}
#dots{
  position:absolute;top:10px;left:50%;transform:translateX(-50%);
  display:flex;gap:9px;z-index:5;
}
.dot{width:9px;height:9px;border-radius:50%;background:rgba(61,43,31,.13);border:2px solid rgba(61,43,31,.14);transition:all .38s}
.dot.active{background:var(--terra);border-color:var(--terra);box-shadow:0 0 0 3px rgba(201,107,58,.2)}
.dot.done{background:rgba(201,107,58,.35);border-color:rgba(201,107,58,.28)}

/* BUBBLE ZONE */
#bubble-zone{
  flex:0 0 auto;
  padding:6px 14px 4px;
  opacity:0;transition:opacity .28s;
}
.bcard{
  background:var(--warm);border-radius:18px;
  padding:11px 14px 10px;
  border:1.5px solid rgba(201,107,58,.16);
  box-shadow:0 4px 18px rgba(61,43,31,.09);
  position:relative;
}
/* tail pointing DOWN toward character */
.bcard::after{
  content:'';position:absolute;
  bottom:-13px;left:50%;transform:translateX(-50%);
  border:12px solid transparent;
  border-top-color:var(--warm);border-bottom:0;
}
.bname{font-size:.6rem;font-family:'Nunito',sans-serif;font-weight:900;text-transform:uppercase;letter-spacing:.12em;color:var(--terra);margin-bottom:3px}
#btxt{font-family:'Nunito',sans-serif;font-size:.88rem;font-weight:700;color:var(--brown);line-height:1.55;min-height:34px}
#btxt.caret::after{content:'|';color:var(--terra);animation:blink .55s step-end infinite}
#msays{
  display:none;
  font-family:'Nunito',sans-serif;font-size:.76rem;font-weight:800;color:var(--terra);
  background:rgba(201,107,58,.08);border:1.5px solid rgba(201,107,58,.2);
  border-radius:10px;padding:5px 11px;margin-top:6px;text-align:center;
}
#msays.show{display:block;animation:slideUp .28s ease}
#msays::before{content:'✨ Aap ne kaha:  ';font-size:.54rem;letter-spacing:.08em;text-transform:uppercase;color:rgba(61,43,31,.38)}
.bfoot{display:flex;justify-content:flex-end;margin-top:7px}
#nxtbtn{
  display:none;align-items:center;gap:4px;
  background:var(--terra);border:none;border-radius:40px;
  padding:6px 18px;color:#fff;
  font-family:'Fredoka One',cursive;font-size:.9rem;cursor:pointer;
  box-shadow:0 3px 0 rgba(140,50,15,.38);
  animation:npulse 1.6s ease-in-out infinite;
  -webkit-appearance:none;
}
#nxtbtn.show{display:flex}
#nxtbtn:active{transform:translateY(2px)}

/* STAGE — fills remaining height, flex column, bottom-aligned */
#stage{
  flex:1;min-height:0;
  display:flex;flex-direction:column;justify-content:flex-end;align-items:center;
  position:relative;overflow:hidden;
}

/* Character wraps naturally above carpet */
#char-wrap{
  position:relative;z-index:5;
  display:flex;justify-content:center;
}
#char-wrap svg{display:block}

/* Name chip */
#chip{
  font-family:'Nunito',sans-serif;font-weight:900;
  font-size:.56rem;letter-spacing:.11em;text-transform:uppercase;color:var(--terra);
  white-space:nowrap;
  background:rgba(255,251,240,.93);padding:2px 10px;border-radius:20px;
  border:1.5px solid rgba(201,107,58,.18);
  opacity:0;transition:opacity .36s;
  text-align:center;margin-bottom:2px;z-index:5;
}
#chip.vis{opacity:1}

/* Carpet */
#carpet{
  width:min(260px,72vw);
  height:56px;
  background:linear-gradient(to bottom,#C96B3A,#A85528);
  border-radius:7px 7px 0 0;
  border:2px solid rgba(240,168,48,.34);border-bottom:none;
  position:relative;z-index:4;overflow:hidden;flex-shrink:0;
}
#carpet::before{content:'';position:absolute;inset:6px;border:1.5px solid rgba(240,168,48,.22);border-radius:3px}
#carpet svg{position:absolute;inset:0;width:100%;height:100%}

/* Ground grass */
#ground{
  width:100%;height:70px;flex-shrink:0;
  background:linear-gradient(to bottom,var(--gr1),var(--gr2));
  border-top:2.5px solid #7A9A58;
  position:relative;z-index:3;
}
#ground::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(255,255,255,.06) 0%,transparent 60%)}

/* Character enter/exit */
.enter-r{animation:enterR .58s cubic-bezier(.34,1.4,.64,1) forwards}
.exit-l{animation:exitL .4s ease-in forwards}
.do-bounce{animation:bounce .48s ease-out}
.do-wiggle{animation:wiggle .44s ease-in-out}

/* Stage sparkles */
.s-star{position:absolute;pointer-events:none;color:var(--terra);opacity:.28;animation:twinkle var(--d,3.5s) var(--dl,0s) ease-in-out infinite;font-size:.72rem}


/* ═══════════════════════════════════
   RESPONSE PANEL
═══════════════════════════════════ */
#rpanel{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(255,251,240,.98);
  border-top:2px solid rgba(201,107,58,.14);
  border-radius:22px 22px 0 0;
  padding:14px 16px max(18px,env(safe-area-inset-bottom));
  display:none;z-index:100;
  box-shadow:0 -4px 26px rgba(61,43,31,.1);
}
#rpanel.show{display:block;animation:slideUp .32s cubic-bezier(.34,1.4,.64,1)}
.rlbl{font-family:'Nunito',sans-serif;font-weight:900;font-size:.6rem;color:rgba(61,43,31,.36);text-align:center;letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px}
.rchoices{display:flex;flex-direction:column;gap:9px}
.rbtn{
  background:rgba(201,107,58,.05);
  border:1.5px solid rgba(201,107,58,.2);
  border-radius:14px;padding:13px 15px;
  color:var(--brown);font-family:'Nunito',sans-serif;
  font-size:.84rem;font-weight:700;
  text-align:left;cursor:pointer;width:100%;
  line-height:1.45;-webkit-appearance:none;
  transition:background .14s,transform .1s;
}
.rbtn:active{background:rgba(201,107,58,.13);transform:scale(.98)}


/* ═══════════════════════════════════
   FINALE
═══════════════════════════════════ */
#finale{
  align-items:center;justify-content:center;text-align:center;
  background:linear-gradient(160deg,var(--sky1) 0%,var(--sky2) 55%,var(--gr1) 100%);
  overflow:hidden;z-index:40;padding:20px;
}
.ftitle{font-size:clamp(2.8rem,11vw,5rem);color:var(--terra);text-shadow:3px 4px 0 rgba(180,60,20,.18);line-height:1.05;z-index:2}
.fsub{font-family:'Nunito',sans-serif;font-weight:800;color:rgba(61,43,31,.55);font-size:clamp(.82rem,3vw,.96rem);margin-top:10px;max-width:290px;line-height:1.75;z-index:2}
.f-btn{
  margin-top:18px;padding:13px 36px;z-index:2;
  background:linear-gradient(135deg,#C96B3A,#E8832A);
  border:none;border-radius:50px;color:#fff;
  font-family:'Fredoka One',cursive;font-size:1.08rem;cursor:pointer;
  box-shadow:0 5px 0 rgba(140,50,15,.38);
  -webkit-appearance:none;transition:transform .12s,box-shadow .12s;
}
.f-btn:active{transform:translateY(2px);box-shadow:0 3px 0 rgba(140,50,15,.38)}
#fin-fw{position:absolute;inset:0;pointer-events:none;z-index:1}
.fw{position:absolute;width:7px;height:7px;border-radius:50%;animation:fwburst 1.1s ease-out forwards}
#fin-fam{z-index:2;margin-top:12px;animation:finFam .65s .1s both ease-out}
</style>
</head>

    <div class="lsw"><svg width="30" height="80" viewBox="0 0 30 80"><line x1="15" y1="0" x2="15" y2="13" stroke="#F0A830" stroke-width="2"/><ellipse cx="15" cy="13" rx="11" ry="3.8" fill="#D09020"/><path d="M4 16 Q15 18 26 16 L28 51 Q15 56 2 51Z" fill="#F0A830"/><path d="M5 27 Q15 29 25 27" stroke="rgba(255,255,255,.22)" fill="none" stroke-width="1"/><path d="M4 38 Q15 40 26 38" stroke="rgba(255,255,255,.16)" fill="none" stroke-width="1"/><ellipse cx="15" cy="51" rx="10" ry="4" fill="#B07018"/><ellipse cx="15" cy="33" rx="6.5" ry="9.5" fill="rgba(255,230,130,.16)"/><line x1="13" y1="55" x2="11.5" y2="68" stroke="#F0A830" stroke-width="1.4"/><line x1="15" y1="55" x2="15" y2="70" stroke="#F0A830" stroke-width="1.4"/><line x1="17" y1="55" x2="18.5" y2="68" stroke="#F0A830" stroke-width="1.4"/></svg></div>
  </div>

  <div class="i-moon mflt">
    <svg viewBox="0 0 88 88" width="70" height="70"><circle cx="44" cy="44" r="41" fill="#F5C840"/><circle cx="61" cy="32" r="32" fill="#FDEBC8"/><circle cx="20" cy="42" r="3.5" fill="rgba(201,107,58,.1)"/><circle cx="28" cy="57" r="2.5" fill="rgba(201,107,58,.08)"/></svg>

    <!-- Character sits here, naturally above carpet -->

    <!-- Carpet strip -->
    <div id="carpet">
      <svg viewBox="0 0 260 56" preserveAspectRatio="none">

/* ── UTILS ── */
function doBounce(){
  const s=$('char-svg');if(!s)return;
  s.classList.remove('do-bounce');void s.offsetWidth;
  s.classList.add('do-bounce');
  setTimeout(()=>s.classList.remove('do-bounce'),500);
}
function doWiggle(){
  const s=$('char-svg');if(!s)return;
  s.classList.remove('do-wiggle');void s.offsetWidth;
  s.classList.add('do-wiggle');
  setTimeout(()=>s.classList.remove('do-wiggle'),460);
}
function typeText(el,text,cb){
  clearInterval(tyTmr);el.textContent='';let i=0;
  tyTmr=setInterval(()=>{
    if(i<text.length){el.textContent+=text[i++]}
    else{clearInterval(tyTmr);cb&&cb()}
  },24);
}
function hidePanel(){const p=$('rpanel');p.className='';p.style.display='none'}
function showPanel(){const p=$('rpanel');p.style.display='block';requestAnimationFrame(()=>p.classList.add('show'))}
function hideMsays(){const m=$('msays');m.className='';m.style.display='none'}
function showMsays(t){const m=$('msays');m.textContent=t;m.style.display='block';requestAnimationFrame(()=>m.classList.add('show'))}

/* ── FLOW ── */
function startStory(){
  $('intro').classList.remove('active');
  $('scene').classList.add('active');
  loadChar(0);
}

function loadChar(idx){
  ci=idx; li=0; picking=false;
  const key=ORDER[idx], ch=CHARS[key];
  // progress dots
  for(let i=0;i<3;i++){
    const d=$('d'+i); d.className='dot';
    if(i<idx) d.classList.add('done');
    else if(i===idx) d.classList.add('active');
  }
  hidePanel(); hideMsays();
  const bz=$('bubble-zone'); bz.style.opacity='0';
  const chip=$('chip'); chip.className=''; chip.textContent='';
  // render character
  $('char-wrap').innerHTML=`<div id="char-svg" class="enter-r" style="filter:drop-shadow(0 6px 14px rgba(0,0,0,.12))">${ch.svg}</div>`;
  setTimeout(()=>{
    chip.textContent=ch.label; chip.classList.add('vis');
    $('bname').textContent=ch.name;
    bz.style.opacity='1';
    setTimeout(showLine,180);
  },500);
}

function showLine(){
  clearInterval(tyTmr);
  hidePanel(); hideMsays();
  const txt=$('btxt'), nxt=$('nxtbtn');
  txt.textContent=''; txt.classList.add('caret'); nxt.classList.remove('show');
  typing=true;
  typeText(txt, CHARS[ORDER[ci]].lines[li], ()=>{
    typing=false; txt.classList.remove('caret');
    nxt.classList.add('show'); doBounce();
  });
}

function nextLine(){
  if(typing){
    clearInterval(tyTmr);
    const ch=CHARS[ORDER[ci]], t=$('btxt');
    t.textContent=ch.lines[li]; t.classList.remove('caret');
    typing=false; $('nxtbtn').classList.add('show'); return;
  }
  li++;
  if(li < CHARS[ORDER[ci]].lines.length) showLine();
  else{ $('nxtbtn').classList.remove('show'); showOptions(); }
}

function showOptions(){
  const ch=CHARS[ORDER[ci]], rc=$('rchoices');
  rc.innerHTML='';
  ch.opts.forEach((opt,i)=>{
    const b=document.createElement('button'); b.className='rbtn'; b.textContent=opt;
    b.onclick=()=>pickOption(i); rc.appendChild(b);
  });
  showPanel();
}

function pickOption(idx){
  if(picking) return; picking=true;
  const ch=CHARS[ORDER[ci]];
  hidePanel();
  showMsays(ch.opts[idx]);
  doWiggle();
  const txt=$('btxt'); txt.textContent=''; txt.classList.add('caret');
  typing=true;
  typeText(txt, ch.react[idx], ()=>{
    typing=false; txt.classList.remove('caret');
    setTimeout(()=>{
      const s=$('char-svg'); if(s) s.classList.add('exit-l');
      $('chip').classList.remove('vis');
      hideMsays();
      setTimeout(()=>{
        if(ci+1 < ORDER.length) loadChar(ci+1); else showFinale();
      },460);
    },2100);
  });
}

function showFinale(){
  $('scene').classList.remove('active');
  $('finale').classList.add('active');
  $('fin-fam').innerHTML=mkFamily();
  [280,950,1750,2550,3350].forEach(d=>setTimeout(firework,d));
}

function firework(){
  const fw=$('fin-fw');
  const cols=['#F0A830','#C96B3A','#1FA896','#E87FA0','#5B9E7A','#F5C840','#5B8EC8','white','#FFD08A'];
  const cx=Math.random()*window.innerWidth, cy=Math.random()*window.innerHeight*.46;
  for(let i=0;i<18;i++){
    const p=document.createElement('div'); p.className='fw';
    const a=(i/18)*Math.PI*2, d=50+Math.random()*80;
    p.style.cssText=`left:${cx}px;top:${cy}px;background:${cols[~~(Math.random()*cols.length)]};--fx:${(Math.cos(a)*d).toFixed(1)}px;--fy:${(Math.sin(a)*d).toFixed(1)}px;animation-delay:${(Math.random()*.16).toFixed(2)}s`;
    fw.appendChild(p); setTimeout(()=>p.remove(),1300);
  }
}
</script>
